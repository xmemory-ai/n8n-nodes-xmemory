name: Publish

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to push the version tag
      id-token: write   # required for npm provenance

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Read version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Fail if tag already exists
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/$VERSION" >/dev/null 2>&1; then
            echo "::error::Tag $VERSION already exists — bump the version in package.json (via PR) before publishing."
            exit 1
          fi
          echo "Tag $VERSION does not exist; proceeding to publish."

      - name: Install dependencies
        run: npm ci

      - name: Release and publish to npm
        run: npm run release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag the published version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # `npm run release` may already create the tag (release-it); only tag/push if it didn't.
          if git ls-remote --exit-code --tags origin "refs/tags/$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already on remote; nothing to push."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rev-parse -q --verify "refs/tags/$VERSION" >/dev/null || git tag "$VERSION"
          git push origin "refs/tags/$VERSION"

      - name: Print published version
        run: echo "Published ${{ steps.version.outputs.version }}"
